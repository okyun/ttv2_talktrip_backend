version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: talktrip-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 0000
      MYSQL_DATABASE: talktrip
      MYSQL_USER: talktrip
      MYSQL_PASSWORD: talktrip123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db-simple.sql:/docker-entrypoint-initdb.d/init-db-simple.sql
    networks:
      - talktrip-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: talktrip-redis
    ports:
      - "6379:6379"
    networks:
      - talktrip-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10

  talktrip-app-1:
    build: .
    container_name: talktrip-app-1
    ports:
      - "8081:80"
      - "5005:5005"  # 디버깅 포트
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/talktrip?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8&useUnicode=true
      - SPRING_DATASOURCE_USERNAME=talktrip
      - SPRING_DATASOURCE_PASSWORD=talktrip123
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - TZ=Asia/Seoul
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - talktrip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: talktrip-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - talktrip-app-1
    networks:
      - talktrip-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: talktrip-kafka
    ports:
      - "9092:9092"   # PLAINTEXT — 광고 localhost:9092 · 호스트(PC)에서 실행하는 앱·kafka-console-consumer·IDE
      - "39092:39092" # PLAINTEXT_INTERNAL — 광고 kafka:39092 · compose 내부 컨테이너(kafka-ui 등) 전용; 호스트 포트 노출은 디버그용 선택
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:39092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:39092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - talktrip-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: talktrip-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8086:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: talktrip-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:39092
    networks:
      - talktrip-network

volumes:
  mysql_data:

networks:
  talktrip-network:
    driver: bridge
